<!DOCTYPE html>
<html>
<head>
    <title>Login - Darshanam.ai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #343541;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #202123;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #19c37d;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Darshanam.ai 🔐</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
