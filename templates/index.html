<!DOCTYPE html>
<html>
<head>
    <title>Darshanam.ai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #343541;
            color: white;
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: #202123;
            padding: 10px;
            height: 100vh;
        }

        .new-chat {
            background: #19c37d;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px;
            background: #202123;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            line-height: 1.4;
        }

        .user {
            background: #0b93f6;
            align-self: flex-end;
        }

        .bot {
            background: #444654;
            align-self: flex-start;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #202123;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px;
            border: none;
            background: #19c37d;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
</div>

<!-- Main -->
<div class="main">

    <div class="header">Darshanam.ai 🤖</div>

    <!-- Chat -->
    <div class="chat-box" id="chatBox">
        {% for chat in chats %}
            <div class="message user">{{ chat.message }}</div>
            <div class="message bot">{{ chat.response }}</div>
        {% endfor %}
    </div>

    <!-- Input -->
    <form method="POST" class="input-box" enctype="multipart/form-data">
        <input type="text" id="messageInput" name="message" placeholder="Type your message..." required>

        <!-- Voice Button -->
        <button type="button" onclick="startVoice()">🎤</button>

        <!-- PDF Upload -->
        <input type="file" name="pdf">
        <button formaction="/upload" formmethod="POST">📄</button>

        <button type="submit">Send</button>
    </form>

</div>

<script>
function newChat(){
    fetch('/reset').then(()=>location.reload());
}

// Auto scroll
let chatBox = document.getElementById("chatBox");
chatBox.scrollTop = chatBox.scrollHeight;

// Typing effect
window.onload = () => {
    let bots = document.querySelectorAll('.bot');
    if(bots.length > 0){
        let last = bots[bots.length - 1];
        let text = last.innerText;
        last.innerText = '';
        let i = 0;

        function type(){
            if(i < text.length){
                last.innerText += text.charAt(i);
                i++;
                setTimeout(type, 20);
            }
        }
        type();
    }
}

// Voice input
function startVoice(){
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.start();

    recognition.onresult = function(event){
        document.getElementById('messageInput').value = event.results[0][0].transcript;
    };
}

// Voice output
function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    window.speechSynthesis.speak(speech);
}

// Speak last message
window.addEventListener('load', () => {
    let bots = document.querySelectorAll('.bot');
    if(bots.length > 0){
        speak(bots[bots.length - 1].innerText);
    }
});
</script>

</body>
</html>
